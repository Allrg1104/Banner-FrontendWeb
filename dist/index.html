<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma Académica Institucional</title>
    <meta name="description" content="Sistema de Gestión Académica y Analítica Predictiva">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700&display=swap"
        rel="stylesheet">

    <!-- External Libs -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Styles -->
  <link rel="stylesheet" crossorigin href="/assets/index-BRUUMj7D.css">
</head>

<body class="antialiased font-sans">

    <!-- App Container -->
    <div id="app" class="min-h-screen flex flex-col">
        <!-- Placeholder para Vistas (SPA) -->
        <main id="main-content" class="flex-grow">
            <div class="flex items-center justify-center h-screen">
                <div class="loader"></div>
            </div>
        </main>
    </div>

    <!-- Modales Globales -->
    <div id="modal-container"
        class="hidden fixed inset-0 z-50 overflow-auto bg-black bg-opacity-50 flex items-center justify-center p-4">
        <div id="modal-content" class="bg-white rounded-2xl shadow-2xl max-w-lg w-full transform transition-all"></div>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container" class="fixed bottom-20 right-4 sm:bottom-4 sm:right-4 z-50 flex flex-col gap-2"></div>

    <!-- Core App Scripts -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/router.js"></script>
    <script src="js/app.js"></script>

    <!-- Views -->
    <script src="views/login.js"></script>
    <script src="views/student-dashboard.js"></script>
    <script src="views/profile.js"></script>
    <script src="views/student.js"></script>
    <script src="views/teacher.js"></script>
    <script src="views/director.js"></script>
    <script src="views/financial.js"></script>
    <script src="views/registro.js"></script>
    <script src="views/admin.js"></script>
    <script src="views/change-password.js"></script>

    <!-- Pre-visualización (puedes borrar esto luego) -->
    <style>
        .loader {
            width: 48px;
            height: 48px;
            border: 5px solid #E5E7EB;
            border-bottom-color: #2563EB;
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</body>

</html>
